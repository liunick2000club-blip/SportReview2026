name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 在全局设置数据库路径，确保所有步骤都能读取到
      DATABASE_URL: "file:./prisma/dev.db" 

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm install

      - name: 初始化 Prisma 与 SQLite 数据库
        run: |
          # 生成客户端
          npx prisma generate 
          # 同步数据库结构
          npx prisma db push --accept-data-loss 

      - name: 执行项目构建
        run: npm run build
        env:
          # 再次确保构建阶段也能访问数据库变量
          DATABASE_URL: "file:./prisma/dev.db"
          # 如果报错提示缺少钉钉变量，请取消下行注释并在 GitHub Secrets 中配置
          # DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
