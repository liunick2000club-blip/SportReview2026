version: '3.8'

services:
  sport-review:
    build: .
    image: sport-review-2026:latest
    container_name: sport-review-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/prisma/dev.db
      - NEXTAUTH_URL=http://localhost:3000 # 如果您要在公网访问，这里要改
      - NEXTAUTH_SECRET=your_secret_here # 建议在环境变量中配置
    volumes:
      # 在群晖上，建议将此路径映射到物理文件夹，例如 /volume1/docker/sport-review/data
      # 映射整个 prisma/prisma 文件夹，以便包含 dev.db
      - ./prisma/prisma:/app/prisma/prisma
      - ./.env:/app/.env
